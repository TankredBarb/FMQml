<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="100%" height="100%">
  <defs>
    <filter id="blur-bg" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" />
    </filter>
    <filter id="shadow-page" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000000" flood-opacity="0.15" />
    </filter>
    <radialGradient id="dropShadowGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#000000" stop-opacity="0.25" />
      <stop offset="80%" stop-color="#000000" stop-opacity="0.04" />
      <stop offset="100%" stop-color="#000000" stop-opacity="0" />
    </radialGradient>
    
    <linearGradient id="pageGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#f5f7fa" />
    </linearGradient>
    
    <linearGradient id="pageBorder" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#cfd8dc" stop-opacity="0.3" />
    </linearGradient>
    
    <linearGradient id="foldGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f5f7fa" />
      <stop offset="100%" stop-color="#cfd8dc" />
    </linearGradient>
  </defs>

  <ellipse cx="128" cy="224" rx="86" ry="10" fill="url(#dropShadowGrad)" filter="url(#blur-bg)" />

  <!-- Main Page -->
  <path d="M 54 42 
           A 12 12 0 0 1 66 30 
           L 166 30 
           L 202 66 
           L 202 208 
           A 12 12 0 0 1 190 220 
           L 66 220 
           A 12 12 0 0 1 54 208 
           Z" 
        fill="url(#pageGradient)" 
        stroke="url(#pageBorder)" 
        stroke-width="1.5"
        filter="url(#shadow-page)" />

  <!-- Folded Corner -->
  <path d="M 166 30 
           L 166 54 
           A 12 12 0 0 0 178 66 
           L 202 66 
           Z" 
        fill="url(#foldGradient)" />

  <path d="M 166 66 L 202 66 L 166 102 Z" fill="#000000" opacity="0.08" />

  <!-- Ruled Notepad Lines -->
  <g>
    <!-- Left vertical red notepad line -->
    <line x1="78" y1="30" x2="78" y2="220" stroke="#ff8a80" stroke-width="1.2" opacity="0.6" />
    
    <!-- Rule lines -->
    <rect x="86" y="66" width="96" height="5" rx="1.5" fill="#78909c" />
    <rect x="86" y="80" width="96" height="5" rx="1.5" fill="#90a4ae" />
    <rect x="86" y="94" width="70" height="5" rx="1.5" fill="#90a4ae" />
    <rect x="86" y="108" width="96" height="5" rx="1.5" fill="#90a4ae" />
    <rect x="86" y="122" width="84" height="5" rx="1.5" fill="#90a4ae" />
    <rect x="86" y="136" width="96" height="5" rx="1.5" fill="#90a4ae" />
    <rect x="86" y="150" width="96" height="5" rx="1.5" fill="#90a4ae" />
    <rect x="86" y="164" width="56" height="5" rx="1.5" fill="#90a4ae" />
    <rect x="86" y="178" width="96" height="5" rx="1.5" fill="#90a4ae" />
    <rect x="86" y="192" width="80" height="5" rx="1.5" fill="#90a4ae" />
  </g>
</svg>
