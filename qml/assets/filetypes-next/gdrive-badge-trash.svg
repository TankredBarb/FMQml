<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="100%" height="100%">
  <defs>
    <!-- Red Gradient for the Trash Can -->
    <linearGradient id="redGrad" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#b71c1c" />
      <stop offset="100%" stop-color="#ff4f3e" />
    </linearGradient>

    <filter id="logo-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#000000" flood-opacity="0.22" />
    </filter>
  </defs>

  <!-- Trash Can Emblem -->
  <g transform="translate(128, 128) scale(1.6) translate(-128, -140)" 
     filter="url(#logo-shadow)" 
     stroke="#ffffff" 
     stroke-width="1.8" 
     stroke-linejoin="round">
    
    <!-- Handle -->
    <path d="M 116 96 C 116 82, 140 82, 140 96" fill="none" stroke="url(#redGrad)" stroke-width="6" stroke-linecap="round" />

    <!-- Body -->
    <path d="M 90 110 L 102 186 A 10 10 0 0 0 112 196 L 144 196 A 10 10 0 0 0 154 186 L 166 110 Z" fill="url(#redGrad)" />
    
    <!-- Lid -->
    <path d="M 82 96 L 174 96 A 6 6 0 0 1 180 102 L 180 104 A 6 6 0 0 1 174 110 L 82 110 A 6 6 0 0 1 76 104 L 76 102 A 6 6 0 0 1 82 96 Z" fill="url(#redGrad)" />

    <!-- Vertical Ribs (white overlays with opacity) -->
    <path d="M 128 126 L 128 180 M 114 126 L 119 180 M 142 126 L 137 180" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round" opacity="0.4" />
  </g>
</svg>
