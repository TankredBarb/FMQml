<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="100%" height="100%">
  <defs>
    <filter id="blur-bg" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" />
    </filter>
    <filter id="shadow-page" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000000" flood-opacity="0.15" />
    </filter>
    <radialGradient id="dropShadowGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#000000" stop-opacity="0.25" />
      <stop offset="80%" stop-color="#000000" stop-opacity="0.04" />
      <stop offset="100%" stop-color="#000000" stop-opacity="0" />
    </radialGradient>
    
    <linearGradient id="pageGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f5f7fa" />
      <stop offset="100%" stop-color="#b0bec5" />
    </linearGradient>
    
    <linearGradient id="pageBorder" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#90a4ae" stop-opacity="0.3" />
    </linearGradient>
    
    <linearGradient id="foldGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#cfd8dc" />
      <stop offset="100%" stop-color="#90a4ae" />
    </linearGradient>

    <!-- Metal gear and window gradients -->
    <linearGradient id="gearGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4fc3f7" />
      <stop offset="100%" stop-color="#0288d1" />
    </linearGradient>
    <linearGradient id="windowHeaderGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0288d1" />
      <stop offset="100%" stop-color="#01579b" />
    </linearGradient>
  </defs>

  <ellipse cx="128" cy="224" rx="86" ry="10" fill="url(#dropShadowGrad)" filter="url(#blur-bg)" />

  <!-- Main Page -->
  <path d="M 54 42 
           A 12 12 0 0 1 66 30 
           L 166 30 
           L 202 66 
           L 202 208 
           A 12 12 0 0 1 190 220 
           L 66 220 
           A 12 12 0 0 1 54 208 
           Z" 
        fill="url(#pageGradient)" 
        stroke="url(#pageBorder)" 
        stroke-width="1.5"
        filter="url(#shadow-page)" />

  <!-- Folded Corner -->
  <path d="M 166 30 
           L 166 54 
           A 12 12 0 0 0 178 66 
           L 202 66 
           Z" 
        fill="url(#foldGradient)" />

  <path d="M 166 66 L 202 66 L 166 102 Z" fill="#000000" opacity="0.08" />

  <!-- Window Frame mockup on file -->
  <g>
    <!-- Header of simulated program window -->
    <rect x="74" y="66" width="80" height="16" rx="3" fill="url(#windowHeaderGrad)" />
    <!-- Three window control dots -->
    <circle cx="82" cy="74" r="2.5" fill="#e57373" />
    <circle cx="90" cy="74" r="2.5" fill="#ffb74d" />
    <circle cx="98" cy="74" r="2.5" fill="#81c784" />

    <!-- Simulated window workspace body -->
    <rect x="74" y="86" width="108" height="108" rx="4" fill="#ffffff" stroke="#90a4ae" stroke-width="1" />
    <line x1="74" y1="110" x2="182" y2="110" stroke="#cfd8dc" stroke-width="1" />
    
    <!-- Left column inside window -->
    <rect x="82" y="118" width="24" height="6" rx="1" fill="#eceff1" />
    <rect x="82" y="128" width="24" height="6" rx="1" fill="#eceff1" />
    <rect x="82" y="138" width="24" height="6" rx="1" fill="#eceff1" />
    
    <!-- Gear Graphic on the right side of the window -->
    <g transform="translate(136, 148)">
      <!-- Outer teeth of the gear -->
      <path d="M -8 -26 L 8 -26 L 11 -18 L 19 -19 L 24 -11 L 18 -5 L 23 4 L 16 11 L 11 8 L 4 13 L 5 21 L -5 21 L -7 13 L -15 10 L -21 16 L -25 8 L -18 3 L -19 -6 L -26 -8 L -24 -16 L -16 -14 L -11 -21 Z" 
            fill="url(#gearGrad)" />
      <!-- Inner core of the gear -->
      <circle cx="0" cy="0" r="10" fill="#ffffff" />
      <circle cx="0" cy="0" r="5" fill="#90a4ae" />
    </g>
  </g>
</svg>
