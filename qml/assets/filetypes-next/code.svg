<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="100%" height="100%">
  <defs>
    <filter id="blur-bg" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" />
    </filter>
    <filter id="shadow-page" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000000" flood-opacity="0.25" />
    </filter>
    <radialGradient id="dropShadowGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#000000" stop-opacity="0.3" />
      <stop offset="80%" stop-color="#000000" stop-opacity="0.05" />
      <stop offset="100%" stop-color="#000000" stop-opacity="0" />
    </radialGradient>
    
    <!-- Code Editor Dark Theme Page -->
    <linearGradient id="pageGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2d3748" />
      <stop offset="100%" stop-color="#1a202c" />
    </linearGradient>
    
    <linearGradient id="pageBorder" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4a5568" />
      <stop offset="100%" stop-color="#2d3748" stop-opacity="0.3" />
    </linearGradient>
    
    <linearGradient id="foldGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4a5568" />
      <stop offset="100%" stop-color="#2d3748" />
    </linearGradient>

    <!-- Neon syntax highlighting gradients -->
    <linearGradient id="codeSymbolGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00f2fe" />
      <stop offset="100%" stop-color="#4facfe" />
    </linearGradient>
  </defs>

  <ellipse cx="128" cy="224" rx="86" ry="10" fill="url(#dropShadowGrad)" filter="url(#blur-bg)" />

  <!-- Main Page (Dark Mode) -->
  <path d="M 54 42 
           A 12 12 0 0 1 66 30 
           L 166 30 
           L 202 66 
           L 202 208 
           A 12 12 0 0 1 190 220 
           L 66 220 
           A 12 12 0 0 1 54 208 
           Z" 
        fill="url(#pageGradient)" 
        stroke="url(#pageBorder)" 
        stroke-width="1.5"
        filter="url(#shadow-page)" />

  <!-- Folded Corner -->
  <path d="M 166 30 
           L 166 54 
           A 12 12 0 0 0 178 66 
           L 202 66 
           Z" 
        fill="url(#foldGradient)" />

  <path d="M 166 66 L 202 66 L 166 102 Z" fill="#000000" opacity="0.15" />

  <!-- Code elements -->
  <g>
    <!-- Code Brackets Symbol </ > -->
    <path d="M 100 100 L 78 120 L 100 140" stroke="url(#codeSymbolGrad)" stroke-width="6.5" stroke-linecap="round" stroke-linejoin="round" fill="none" />
    <path d="M 156 100 L 178 120 L 156 140" stroke="url(#codeSymbolGrad)" stroke-width="6.5" stroke-linecap="round" stroke-linejoin="round" fill="none" />
    <line x1="134" y1="94" x2="122" y2="146" stroke="#f687b3" stroke-width="6.5" stroke-linecap="round" />
    
    <!-- Code line simulators below -->
    <rect x="74" y="166" width="48" height="6" rx="2" fill="#4fd1c5" opacity="0.8" />
    <rect x="128" y="166" width="54" height="6" rx="2" fill="#ecc94b" opacity="0.8" />
    
    <rect x="74" y="180" width="80" height="6" rx="2" fill="#ecc94b" opacity="0.8" />
    <rect x="160" y="180" width="22" height="6" rx="2" fill="#4fd1c5" opacity="0.8" />
    
    <rect x="74" y="194" width="60" height="6" rx="2" fill="#f687b3" opacity="0.8" />
  </g>
</svg>
