<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="100%" height="100%">
  <defs>
    <!-- Background blur for contact shadow -->
    <filter id="blur-bg" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" />
    </filter>
    <filter id="shadow-page" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="5" stdDeviation="6" flood-color="#000000" flood-opacity="0.15" />
    </filter>
    <filter id="shadow-front" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#37474f" flood-opacity="0.22" />
    </filter>

    <radialGradient id="dropShadowGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#000000" stop-opacity="0.25" />
      <stop offset="80%" stop-color="#000000" stop-opacity="0.04" />
      <stop offset="100%" stop-color="#000000" stop-opacity="0" />
    </radialGradient>
    
    <!-- Metallic trash can body gradient -->
    <linearGradient id="trashBodyGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#b0bec5" />
      <stop offset="15%" stop-color="#eceff1" />
      <stop offset="35%" stop-color="#b0bec5" />
      <stop offset="55%" stop-color="#cfd8dc" />
      <stop offset="75%" stop-color="#90a4ae" />
      <stop offset="90%" stop-color="#b0bec5" />
      <stop offset="100%" stop-color="#78909c" />
    </linearGradient>

    <!-- Glowing top rim highlight -->
    <linearGradient id="rimHighlight" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1.0" />
      <stop offset="30%" stop-color="#e3f2fd" stop-opacity="0.9" />
      <stop offset="70%" stop-color="#90caf9" stop-opacity="0.6" />
      <stop offset="100%" stop-color="#42a5f5" stop-opacity="0.8" />
    </linearGradient>

    <!-- Trash can border highlight -->
    <linearGradient id="trashBorder" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#90a4ae" stop-opacity="0.2" />
    </linearGradient>

    <linearGradient id="cardGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#eceff1" />
    </linearGradient>

    <linearGradient id="frontGradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffe082" />
      <stop offset="40%" stop-color="#ffa000" />
      <stop offset="100%" stop-color="#ff6f00" />
    </linearGradient>

    <!-- Google Drive Colors -->
    <linearGradient id="blueGrad" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#005ecb" />
      <stop offset="100%" stop-color="#2684fc" />
    </linearGradient>
    <linearGradient id="greenGrad" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#00832d" />
      <stop offset="100%" stop-color="#00ea61" />
    </linearGradient>
    <linearGradient id="redGrad" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#b71c1c" />
      <stop offset="100%" stop-color="#ff4f3e" />
    </linearGradient>
    <linearGradient id="yellowGrad" x1="1" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#ff8f00" />
      <stop offset="100%" stop-color="#ffeb3b" />
    </linearGradient>
  </defs>

  <!-- Ambient Shadow -->
  <ellipse cx="128" cy="224" rx="86" ry="10" fill="url(#dropShadowGrad)" filter="url(#blur-bg)" />

  <!-- 1. Dark interior background of the trash can -->
  <ellipse cx="128" cy="90" rx="64" ry="14" fill="#202a30" />

  <!-- 2. Discarded files peeking out -->
  <!-- Crumpled yellow folder on the right -->
  <g transform="translate(142, 84) rotate(16) translate(-35, -45)">
    <path d="M 10 30 
             A 4 4 0 0 1 14 26 
             L 40 26 
             A 4 4 0 0 1 44 29 
             L 48 33 
             A 4 4 0 0 0 52 35 
             L 76 35 
             A 4 4 0 0 1 80 39 
             L 80 85 
             A 4 4 0 0 1 76 89 
             L 14 89 
             A 4 4 0 0 1 10 85 
             Z" 
          fill="url(#frontGradient)" 
          opacity="0.85" 
          filter="url(#shadow-page)" />
  </g>

  <!-- Crumpled/Discarded Document sheet with faded Google Drive Logo -->
  <g transform="translate(98, 76) rotate(-18) translate(-40, -50)">
    <!-- Document background -->
    <path d="M 10 15 
             A 4 4 0 0 1 14 11 
             L 60 11 
             L 76 27 
             L 76 85 
             A 4 4 0 0 1 72 89 
             L 14 89 
             A 4 4 0 0 1 10 85 
             Z" 
          fill="url(#cardGrad)" 
          stroke="#b0bec5" 
          stroke-width="1.2" 
          filter="url(#shadow-page)" />
    
    <!-- Document dog-ear fold -->
    <path d="M 60 11 L 60 21 A 2 2 0 0 0 62 23 L 72 23 Z" fill="#cfd8dc" />

    <!-- Faded GDrive Logo -->
    <g transform="translate(43, 52) scale(0.3) translate(-44, -39)" opacity="0.55">
      <path d="m6.6 66.85 3.85 6.65c.8 1.4 1.95 2.5 3.3 3.3l13.75-23.8h-27.5c0 1.55.4 3.1 1.2 4.5z" 
            fill="url(#blueGrad)" />
      <path d="m43.65 25-13.75-23.8c-1.35.8-2.5 1.9-3.3 3.3l-25.4 44a9.06 9.06 0 0 0 -1.2 4.5h27.5z" 
            fill="url(#greenGrad)" />
      <path d="m73.55 76.8c1.35-.8 2.5-1.9 3.3-3.3l1.6-2.75 7.65-13.25c.8-1.4 1.2-2.95 1.2-4.5h-27.502l5.852 11.5z" 
            fill="url(#redGrad)" />
    </g>
  </g>

  <!-- 3. Front face of the trash can body -->
  <path d="M 64 90 
           L 80 208 
           A 48 10 0 0 0 176 208 
           L 192 90 
           A 64 14 0 0 1 64 90 
           Z" 
        fill="url(#trashBodyGrad)" 
        stroke="url(#trashBorder)" 
        stroke-width="1.2"
        filter="url(#shadow-front)" />

  <!-- 4. Vertical Ribs / Highlights on the trash can front -->
  <!-- Rib 1 -->
  <line x1="95" y1="110" x2="103" y2="200" stroke="#78909c" stroke-width="1.8" opacity="0.35" />
  <line x1="96" y1="110" x2="104" y2="200" stroke="#ffffff" stroke-width="1.8" opacity="0.25" />

  <!-- Rib 2 -->
  <line x1="116" y1="112" x2="119" y2="202" stroke="#78909c" stroke-width="1.8" opacity="0.35" />
  <line x1="117" y1="112" x2="120" y2="202" stroke="#ffffff" stroke-width="1.8" opacity="0.25" />

  <!-- Rib 3 -->
  <line x1="140" y1="112" x2="137" y2="202" stroke="#78909c" stroke-width="1.8" opacity="0.35" />
  <line x1="139" y1="112" x2="136" y2="202" stroke="#ffffff" stroke-width="1.8" opacity="0.25" />

  <!-- Rib 4 -->
  <line x1="161" y1="110" x2="153" y2="200" stroke="#78909c" stroke-width="1.8" opacity="0.35" />
  <line x1="160" y1="110" x2="152" y2="200" stroke="#ffffff" stroke-width="1.8" opacity="0.25" />

  <!-- 5. Front part of the rim lip (covers paper going inside the bucket) -->
  <path d="M 64 90 
           A 64 14 0 0 1 192 90" 
        fill="none" 
        stroke="url(#rimHighlight)" 
        stroke-width="2.8" 
        stroke-linecap="round" />
</svg>
