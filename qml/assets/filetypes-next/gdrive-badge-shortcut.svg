<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="100%" height="100%">
  <defs>
    <!-- Google Drive Shortcut Color Gradient -->
    <linearGradient id="arrowGrad" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#0288d1" />
      <stop offset="100%" stop-color="#00e5ff" />
    </linearGradient>

    <filter id="logo-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#000000" flood-opacity="0.22" />
    </filter>
  </defs>

  <!-- Shortcut Arrow Emblem -->
  <g transform="translate(128, 128) scale(1.6) translate(-142, -126)" 
     filter="url(#logo-shadow)" 
     stroke="#ffffff" 
     stroke-width="1.8" 
     stroke-linejoin="round">
    <path d="M 80 176 
             C 80 120 120 96 160 96 
             L 160 76 
             L 204 112 
             L 160 148 
             L 160 128 
             C 126 128 106 142 98 176 
             Z" 
          fill="url(#arrowGrad)" />
  </g>
</svg>
