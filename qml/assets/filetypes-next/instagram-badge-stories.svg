<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="100%" height="100%">
  <defs>
    <radialGradient id="igStoriesGrad" cx="30%" cy="100%" r="110%">
      <stop offset="0%" stop-color="#feda75"/>
      <stop offset="25%" stop-color="#fa7e1e"/>
      <stop offset="55%" stop-color="#d62976"/>
      <stop offset="80%" stop-color="#962fbf"/>
      <stop offset="100%" stop-color="#4f5bd5"/>
    </radialGradient>
    <filter id="badgeShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <g filter="url(#badgeShadow)">
    <!-- Base gradient circle -->
    <circle cx="128" cy="128" r="108" fill="url(#igStoriesGrad)"/>
    <!-- Story ring -->
    <circle cx="128" cy="128" r="86" fill="none" stroke="#ffffff" stroke-width="12"/>
    <!-- Story play emblem inside -->
    <path d="M 112 96 L 162 128 L 112 160 Z" fill="#ffffff"/>
