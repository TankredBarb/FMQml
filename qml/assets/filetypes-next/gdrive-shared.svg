<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="100%" height="100%">
  <defs>
    <!-- Background blur for contact shadow -->
    <filter id="blur-bg" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" />
    </filter>
    <filter id="shadow-insert" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#000000" flood-opacity="0.12" />
    </filter>
    <filter id="shadow-front" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="-2" stdDeviation="4" flood-color="#5c3a00" flood-opacity="0.08" />
      <feDropShadow dx="0" dy="5" stdDeviation="6" flood-color="#3e2723" flood-opacity="0.22" />
    </filter>
    <filter id="logo-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.18" />
    </filter>

    <radialGradient id="dropShadowGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#000000" stop-opacity="0.3" />
      <stop offset="80%" stop-color="#000000" stop-opacity="0.05" />
      <stop offset="100%" stop-color="#000000" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="backGradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffe082" />
      <stop offset="100%" stop-color="#e65100" />
    </linearGradient>
    <linearGradient id="frontGradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffe082" />
      <stop offset="40%" stop-color="#ffa000" />
      <stop offset="100%" stop-color="#ff6f00" />
    </linearGradient>
    <linearGradient id="frontBorder" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.7" />
      <stop offset="30%" stop-color="#ffffff" stop-opacity="0.2" />
      <stop offset="100%" stop-color="#ffab00" stop-opacity="0.1" />
    </linearGradient>
    <linearGradient id="cardGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#eceff1" />
    </linearGradient>

    <!-- Fluent Gradients for People Badges -->
    <linearGradient id="blueGrad" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#005ecb" />
      <stop offset="100%" stop-color="#2684fc" />
    </linearGradient>
    <linearGradient id="cyanGrad" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#00b0ff" />
      <stop offset="100%" stop-color="#00e5ff" />
    </linearGradient>
    <linearGradient id="greenGrad" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#00832d" />
      <stop offset="100%" stop-color="#00ea61" />
    </linearGradient>
    <linearGradient id="yellowGrad" x1="1" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#ff8f00" />
      <stop offset="100%" stop-color="#ffeb3b" />
    </linearGradient>
    <linearGradient id="redGrad" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#b71c1c" />
      <stop offset="100%" stop-color="#ff4f3e" />
    </linearGradient>
  </defs>

  <!-- Ambient Shadow -->
  <ellipse cx="128" cy="222" rx="106" ry="12" fill="url(#dropShadowGrad)" filter="url(#blur-bg)" />

  <!-- Back Flap -->
  <path d="M 24 82 
           A 12 12 0 0 1 36 70 
           L 90 70 
           A 12 12 0 0 1 102 78 
           L 112 88 
           A 12 12 0 0 0 120 92 
           L 220 92 
           A 12 12 0 0 1 232 104 
           L 232 208 
           A 12 12 0 0 1 220 220 
           L 36 220 
           A 12 12 0 0 1 24 208 
           Z" 
        fill="url(#backGradient)" />

  <!-- Inserted Document Sheet with User Avatars -->
  <g transform="rotate(-2 128 130)" filter="url(#shadow-insert)">
    <rect x="48" y="75" width="160" height="110" rx="8" fill="url(#cardGrad)" />
    
    <!-- Title Line -->
    <rect x="64" y="92" width="60" height="6" rx="2.5" fill="#90caf9" />
    
    <!-- Collaborative avatars -->
    <circle cx="76" cy="122" r="14" fill="url(#blueGrad)" stroke="#ffffff" stroke-width="2" />
    <circle cx="98" cy="122" r="14" fill="url(#greenGrad)" stroke="#ffffff" stroke-width="2" />
    <circle cx="120" cy="122" r="14" fill="url(#redGrad)" stroke="#ffffff" stroke-width="2" />
    
    <!-- Document lines next to avatars -->
    <rect x="144" y="115" width="44" height="4" rx="1.5" fill="#cfd8dc" />
    <rect x="144" y="125" width="34" height="4" rx="1.5" fill="#cfd8dc" />
    
    <rect x="64" y="148" width="128" height="4" rx="1.5" fill="#cfd8dc" />
    <rect x="64" y="158" width="96" height="4" rx="1.5" fill="#cfd8dc" />
  </g>

  <!-- Front Flap -->
  <path d="M 24 124 
           A 12 12 0 0 1 36 112 
           L 220 112 
           A 12 12 0 0 1 232 124 
           L 232 208 
           A 12 12 0 0 1 220 220 
           L 36 220 
           A 12 12 0 0 1 24 208 
           Z" 
        fill="url(#frontGradient)" 
        stroke="url(#frontBorder)" 
        stroke-width="1.5"
        filter="url(#shadow-front)" />

  <!-- Shared 2-People Emblem on Front Flap -->
  <g filter="url(#logo-shadow)" stroke="#ffffff" stroke-width="1.5" stroke-linejoin="round">
    <!-- Back Person (Cyan) -->
    <circle cx="144" cy="150" r="10" fill="url(#cyanGrad)" />
    <path d="M 125 180 
             A 1 1 0 0 0 126 181 
             L 162 181 
             A 1 1 0 0 0 163 180 
             C 163 167 154 162 144 162 
             C 134 162 125 167 125 180 
             Z" 
          fill="url(#cyanGrad)" />

    <!-- Front Person (Blue) -->
    <circle cx="114" cy="156" r="12" fill="url(#blueGrad)" />
    <path d="M 90 192 
             A 1 1 0 0 0 91 193 
             L 137 193 
             A 1 1 0 0 0 138 192 
             C 138 177 127 170 114 170 
             C 101 170 90 177 90 192 
             Z" 
          fill="url(#blueGrad)" />
  </g>
</svg>
