<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="100%" height="100%">
  <defs>
    <filter id="blur-bg" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" />
    </filter>
    <filter id="shadow-page" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000000" flood-opacity="0.15" />
    </filter>
    <radialGradient id="dropShadowGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#000000" stop-opacity="0.25" />
      <stop offset="80%" stop-color="#000000" stop-opacity="0.04" />
      <stop offset="100%" stop-color="#000000" stop-opacity="0" />
    </radialGradient>
    
    <linearGradient id="pageGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#eceff1" />
    </linearGradient>
    
    <linearGradient id="pageBorder" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#cfd8dc" stop-opacity="0.3" />
    </linearGradient>
    
    <linearGradient id="foldGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eceff1" />
      <stop offset="100%" stop-color="#b0bec5" />
    </linearGradient>

    <!-- Excel Green gradients -->
    <linearGradient id="sheetHeaderGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4caf50" />
      <stop offset="100%" stop-color="#2e7d32" />
    </linearGradient>
  </defs>

  <ellipse cx="128" cy="224" rx="86" ry="10" fill="url(#dropShadowGrad)" filter="url(#blur-bg)" />

  <!-- Main Page -->
  <path d="M 54 42 
           A 12 12 0 0 1 66 30 
           L 166 30 
           L 202 66 
           L 202 208 
           A 12 12 0 0 1 190 220 
           L 66 220 
           A 12 12 0 0 1 54 208 
           Z" 
        fill="url(#pageGradient)" 
        stroke="url(#pageBorder)" 
        stroke-width="1.5"
        filter="url(#shadow-page)" />

  <!-- Folded Corner -->
  <path d="M 166 30 
           L 166 54 
           A 12 12 0 0 0 178 66 
           L 202 66 
           Z" 
        fill="url(#foldGradient)" />

  <path d="M 166 66 L 202 66 L 166 102 Z" fill="#000000" opacity="0.08" />

  <!-- Spreadsheet Grid Elements -->
  <g>
    <!-- Green Header -->
    <rect x="74" y="60" width="80" height="20" rx="4" fill="url(#sheetHeaderGrad)" />
    
    <!-- Table Grid container -->
    <rect x="74" y="94" width="108" height="96" rx="4" fill="#ffffff" stroke="#cfd8dc" stroke-width="1.2" />
    
    <!-- Grid columns -->
    <line x1="110" y1="94" x2="110" y2="190" stroke="#cfd8dc" stroke-width="1" />
    <line x1="146" y1="94" x2="146" y2="190" stroke="#cfd8dc" stroke-width="1" />
    
    <!-- Grid rows -->
    <line x1="74" y1="113" x2="182" y2="113" stroke="#cfd8dc" stroke-width="1.2" fill="none" />
    <line x1="74" y1="132" x2="182" y2="132" stroke="#cfd8dc" stroke-width="1" fill="none" />
    <line x1="74" y1="151" x2="182" y2="151" stroke="#cfd8dc" stroke-width="1" fill="none" />
    <line x1="74" y1="170" x2="182" y2="170" stroke="#cfd8dc" stroke-width="1" fill="none" />

    <!-- Simulated cell values/bars -->
    <!-- Headers -->
    <rect x="80" y="100" width="24" height="6" rx="1.5" fill="#2e7d32" opacity="0.75" />
    <rect x="116" y="100" width="24" height="6" rx="1.5" fill="#2e7d32" opacity="0.75" />
    <rect x="152" y="100" width="24" height="6" rx="1.5" fill="#2e7d32" opacity="0.75" />

    <!-- Row 1 -->
    <rect x="80" y="120" width="20" height="5" rx="1" fill="#78909c" />
    <rect x="116" y="120" width="16" height="5" rx="1" fill="#4caf50" />
    <rect x="152" y="120" width="22" height="5" rx="1" fill="#cfd8dc" />

    <!-- Row 2 -->
    <rect x="80" y="139" width="14" height="5" rx="1" fill="#78909c" />
    <rect x="116" y="139" width="24" height="5" rx="1" fill="#4caf50" />
    <rect x="152" y="139" width="10" height="5" rx="1" fill="#cfd8dc" />

    <!-- Row 3 -->
    <rect x="80" y="158" width="22" height="5" rx="1" fill="#78909c" />
    <rect x="116" y="158" width="12" height="5" rx="1" fill="#cfd8dc" />
    <rect x="152" y="158" width="18" height="5" rx="1" fill="#4caf50" />

    <!-- Row 4 -->
    <rect x="80" y="177" width="18" height="5" rx="1" fill="#78909c" />
    <rect x="116" y="177" width="20" height="5" rx="1" fill="#4caf50" />
    <rect x="152" y="177" width="14" height="5" rx="1" fill="#cfd8dc" />
    
    <!-- Title helper at the bottom -->
    <rect x="74" y="198" width="108" height="8" rx="2" fill="#cfd8dc" opacity="0.6" />
  </g>
</svg>
