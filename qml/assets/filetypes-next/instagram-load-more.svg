<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="100%" height="100%">
  <defs>
    <filter id="blur-bg" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" />
    </filter>
    <filter id="shadow-insert" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#000000" flood-opacity="0.12" />
    </filter>
    <filter id="shadow-front" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="-2" stdDeviation="4" flood-color="#5c3a00" flood-opacity="0.08" />
      <feDropShadow dx="0" dy="5" stdDeviation="6" flood-color="#3e2723" flood-opacity="0.22" />
    </filter>
    <filter id="badgeShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#000000" flood-opacity="0.25"/>
    </filter>

    <radialGradient id="dropShadowGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#000000" stop-opacity="0.3" />
      <stop offset="80%" stop-color="#000000" stop-opacity="0.05" />
      <stop offset="100%" stop-color="#000000" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="backGradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffe082" />
      <stop offset="100%" stop-color="#e65100" />
    </linearGradient>
    <linearGradient id="frontGradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffe082" />
      <stop offset="40%" stop-color="#ffa000" />
      <stop offset="100%" stop-color="#ff6f00" />
    </linearGradient>
    <linearGradient id="frontBorder" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.7" />
      <stop offset="30%" stop-color="#ffffff" stop-opacity="0.2" />
      <stop offset="100%" stop-color="#ffab00" stop-opacity="0.1" />
    </linearGradient>
    <linearGradient id="cardGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#eceff1" />
    </linearGradient>

    <radialGradient id="igLoadMoreGrad" cx="30%" cy="100%" r="110%">
      <stop offset="0%" stop-color="#feda75"/>
      <stop offset="25%" stop-color="#fa7e1e"/>
      <stop offset="55%" stop-color="#d62976"/>
      <stop offset="80%" stop-color="#962fbf"/>
      <stop offset="100%" stop-color="#4f5bd5"/>
    </radialGradient>
  </defs>

  <!-- Ambient Shadow -->
  <ellipse cx="128" cy="222" rx="106" ry="12" fill="url(#dropShadowGrad)" filter="url(#blur-bg)" />

  <!-- Back Flap -->
  <path d="M 24 82 A 12 12 0 0 1 36 70 L 90 70 A 12 12 0 0 1 102 78 L 112 88 A 12 12 0 0 0 120 92 L 220 92 A 12 12 0 0 1 232 104 L 232 208 A 12 12 0 0 1 220 220 L 36 220 A 12 12 0 0 1 24 208 Z" fill="url(#backGradient)" />

  <!-- Inserted Document Sheet -->
  <g transform="rotate(-2 128 130)" filter="url(#shadow-insert)">
    <rect x="48" y="75" width="160" height="110" rx="8" fill="url(#cardGrad)" />
    <rect x="64" y="94" width="60" height="6" rx="2.5" fill="#9c27b0" opacity="0.7"/>
    <rect x="64" y="108" width="128" height="4" rx="1.5" fill="#cfd8dc" />
    <rect x="64" y="118" width="128" height="4" rx="1.5" fill="#cfd8dc" />
    <rect x="64" y="128" width="96" height="4" rx="1.5" fill="#cfd8dc" />
  </g>

  <!-- Front Flap -->
  <path d="M 24 124 A 12 12 0 0 1 36 112 L 220 112 A 12 12 0 0 1 232 124 L 232 208 A 12 12 0 0 1 220 220 L 36 220 A 12 12 0 0 1 24 208 Z" fill="url(#frontGradient)" stroke="url(#frontBorder)" stroke-width="1.5" filter="url(#shadow-front)" />

  <!-- Badge Emblem (Load More) overlayed on bottom right -->
  <g transform="translate(170, 166) scale(0.48)" filter="url(#badgeShadow)">
    <circle cx="0" cy="0" r="70" fill="url(#igLoadMoreGrad)" stroke="#ffffff" stroke-width="8"/>
    <circle cx="0" cy="0" r="56" fill="none" stroke="#ffffff" stroke-width="4" opacity="0.4"/>
    <path d="M 0 -36 L 0 36 M -36 0 L 36 0" stroke="#ffffff" stroke-width="15" stroke-linecap="round"/>
  </g>
</svg>
