<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="100%" height="100%">
  <defs>
    <filter id="blur-bg" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" />
    </filter>
    <filter id="shadow-page" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000000" flood-opacity="0.25" />
    </filter>
    <radialGradient id="dropShadowGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#000000" stop-opacity="0.3" />
      <stop offset="80%" stop-color="#000000" stop-opacity="0.05" />
      <stop offset="100%" stop-color="#000000" stop-opacity="0" />
    </radialGradient>
    
    <!-- Dark video editor page theme -->
    <linearGradient id="pageGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#37474f" />
      <stop offset="100%" stop-color="#212121" />
    </linearGradient>
    
    <linearGradient id="pageBorder" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#546e7a" />
      <stop offset="100%" stop-color="#212121" stop-opacity="0.3" />
    </linearGradient>
    
    <linearGradient id="foldGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#546e7a" />
      <stop offset="100%" stop-color="#263238" />
    </linearGradient>

    <!-- Play button gradient -->
    <linearGradient id="playGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00e5ff" />
      <stop offset="100%" stop-color="#00b0ff" />
    </linearGradient>
    <filter id="play-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#00b0ff" flood-opacity="0.35" />
    </filter>
  </defs>

  <ellipse cx="128" cy="224" rx="86" ry="10" fill="url(#dropShadowGrad)" filter="url(#blur-bg)" />

  <!-- Main Page -->
  <path d="M 54 42 
           A 12 12 0 0 1 66 30 
           L 166 30 
           L 202 66 
           L 202 208 
           A 12 12 0 0 1 190 220 
           L 66 220 
           A 12 12 0 0 1 54 208 
           Z" 
        fill="url(#pageGradient)" 
        stroke="url(#pageBorder)" 
        stroke-width="1.5"
        filter="url(#shadow-page)" />

  <!-- Folded Corner -->
  <path d="M 166 30 
           L 166 54 
           A 12 12 0 0 0 178 66 
           L 202 66 
           Z" 
        fill="url(#foldGradient)" />

  <path d="M 166 66 L 202 66 L 166 102 Z" fill="#000000" opacity="0.15" />

  <!-- Video elements -->
  <g>
    <!-- Filmstrip border background on left side -->
    <rect x="68" y="56" width="20" height="140" rx="2" fill="#263238" />
    
    <!-- Filmstrip punch holes -->
    <rect x="74" y="64" width="8" height="8" rx="1.5" fill="#37474f" />
    <rect x="74" y="80" width="8" height="8" rx="1.5" fill="#37474f" />
    <rect x="74" y="96" width="8" height="8" rx="1.5" fill="#37474f" />
    <rect x="74" y="112" width="8" height="8" rx="1.5" fill="#37474f" />
    <rect x="74" y="128" width="8" height="8" rx="1.5" fill="#37474f" />
    <rect x="74" y="144" width="8" height="8" rx="1.5" fill="#37474f" />
    <rect x="74" y="160" width="8" height="8" rx="1.5" fill="#37474f" />
    <rect x="74" y="176" width="8" height="8" rx="1.5" fill="#37474f" />

    <!-- Big Glowing Play Button -->
    <g filter="url(#play-glow)">
      <!-- Circle backdrop -->
      <circle cx="138" cy="122" r="32" fill="url(#playGrad)" />
      <!-- Inner triangle icon -->
      <path d="M 128 106 L 156 122 L 128 138 Z" fill="#ffffff" />
    </g>

    <!-- Ruled details at the bottom of the video file -->
    <rect x="74" y="196" width="108" height="8" rx="2" fill="#37474f" />
  </g>
</svg>
