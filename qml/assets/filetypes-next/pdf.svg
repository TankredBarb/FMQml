<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="100%" height="100%">
  <defs>
    <filter id="blur-bg" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" />
    </filter>
    <filter id="shadow-page" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000000" flood-opacity="0.15" />
    </filter>
    <radialGradient id="dropShadowGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#000000" stop-opacity="0.25" />
      <stop offset="80%" stop-color="#000000" stop-opacity="0.04" />
      <stop offset="100%" stop-color="#000000" stop-opacity="0" />
    </radialGradient>
    
    <linearGradient id="pageGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#eceff1" />
    </linearGradient>
    
    <linearGradient id="pageBorder" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#cfd8dc" stop-opacity="0.3" />
    </linearGradient>
    
    <linearGradient id="foldGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eceff1" />
      <stop offset="100%" stop-color="#b0bec5" />
    </linearGradient>

    <!-- PDF Red gradients -->
    <linearGradient id="pdfHeaderGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ef5350" />
      <stop offset="100%" stop-color="#c62828" />
    </linearGradient>
    <linearGradient id="pdfIconGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ef5350" />
      <stop offset="100%" stop-color="#b71c1c" />
    </linearGradient>
  </defs>

  <ellipse cx="128" cy="224" rx="86" ry="10" fill="url(#dropShadowGrad)" filter="url(#blur-bg)" />

  <!-- Main Page -->
  <path d="M 54 42 
           A 12 12 0 0 1 66 30 
           L 166 30 
           L 202 66 
           L 202 208 
           A 12 12 0 0 1 190 220 
           L 66 220 
           A 12 12 0 0 1 54 208 
           Z" 
        fill="url(#pageGradient)" 
        stroke="url(#pageBorder)" 
        stroke-width="1.5"
        filter="url(#shadow-page)" />

  <!-- Folded Corner -->
  <path d="M 166 30 
           L 166 54 
           A 12 12 0 0 0 178 66 
           L 202 66 
           Z" 
        fill="url(#foldGradient)" />

  <path d="M 166 66 L 202 66 L 166 102 Z" fill="#000000" opacity="0.08" />

  <!-- PDF Graphic Elements -->
  <g>
    <!-- PDF Red Header -->
    <rect x="74" y="60" width="80" height="20" rx="4" fill="url(#pdfHeaderGrad)" />
    
    <!-- Red PDF badge ribbon -->
    <path d="M 90 92 L 166 92 L 166 170 L 128 152 L 90 170 Z" fill="url(#pdfIconGrad)" />
    
    <!-- Stylized Acrobat loop logo inside ribbon -->
    <path d="M 116 128 C 110 134 116 142 124 139 C 132 136 136 122 128 114 C 120 106 120 114 116 128 Z" 
          stroke="#ffffff" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-linejoin="round" />
    <path d="M 124 139 C 134 143 146 141 140 132 C 134 123 126 120 120 114" 
          stroke="#ffffff" stroke-width="3.5" fill="none" stroke-linecap="round" />

    <!-- Label at bottom of ribbon -->
    <text x="128" y="106" font-family="Segoe UI, Arial, sans-serif" font-weight="bold" font-size="11" fill="#ffffff" text-anchor="middle" letter-spacing="1.2">PDF</text>
    
    <!-- Rules lines below -->
    <rect x="74" y="184" width="108" height="6" rx="2" fill="#cfd8dc" />
    <rect x="74" y="196" width="68" height="6" rx="2" fill="#cfd8dc" />
  </g>
</svg>
