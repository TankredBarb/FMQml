<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="100%" height="100%">
  <defs>
    <!-- Background blur for contact shadow -->
    <filter id="blur-bg" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" />
    </filter>
    <filter id="shadow-insert" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#000000" flood-opacity="0.12" />
    </filter>
    <filter id="shadow-front" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="-2" stdDeviation="4" flood-color="#5c3a00" flood-opacity="0.08" />
      <feDropShadow dx="0" dy="5" stdDeviation="6" flood-color="#3e2723" flood-opacity="0.22" />
    </filter>
    <filter id="logo-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.18" />
    </filter>
    <filter id="shadow-segment" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="-1" dy="2.5" stdDeviation="3" flood-color="#000000" flood-opacity="0.22" />
    </filter>
    <filter id="arrow-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#0288d1" flood-opacity="0.3" />
    </filter>

    <radialGradient id="dropShadowGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#000000" stop-opacity="0.3" />
      <stop offset="80%" stop-color="#000000" stop-opacity="0.05" />
      <stop offset="100%" stop-color="#000000" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="backGradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffe082" />
      <stop offset="100%" stop-color="#e65100" />
    </linearGradient>
    <linearGradient id="frontGradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffe082" />
      <stop offset="40%" stop-color="#ffa000" />
      <stop offset="100%" stop-color="#ff6f00" />
    </linearGradient>
    <linearGradient id="frontBorder" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.7" />
      <stop offset="30%" stop-color="#ffffff" stop-opacity="0.2" />
      <stop offset="100%" stop-color="#ffab00" stop-opacity="0.1" />
    </linearGradient>
    <linearGradient id="cardGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#eceff1" />
    </linearGradient>

    <!-- Google Drive Colors -->
    <linearGradient id="blueGrad" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#005ecb" />
      <stop offset="100%" stop-color="#2684fc" />
    </linearGradient>
    <linearGradient id="greenGrad" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#00832d" />
      <stop offset="100%" stop-color="#00ea61" />
    </linearGradient>
    <linearGradient id="redGrad" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#b71c1c" />
      <stop offset="100%" stop-color="#ff4f3e" />
    </linearGradient>
    <linearGradient id="yellowGrad" x1="1" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#ff8f00" />
      <stop offset="100%" stop-color="#ffeb3b" />
    </linearGradient>

    <!-- Arrow Gradient -->
    <linearGradient id="arrowGrad" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#0288d1" />
      <stop offset="100%" stop-color="#00e5ff" />
    </linearGradient>
  </defs>

  <!-- Ambient Shadow -->
  <ellipse cx="128" cy="222" rx="106" ry="12" fill="url(#dropShadowGrad)" filter="url(#blur-bg)" />

  <!-- Back Flap -->
  <path d="M 24 82 
           A 12 12 0 0 1 36 70 
           L 90 70 
           A 12 12 0 0 1 102 78 
           L 112 88 
           A 12 12 0 0 0 120 92 
           L 220 92 
           A 12 12 0 0 1 232 104 
           L 232 208 
           A 12 12 0 0 1 220 220 
           L 36 220 
           A 12 12 0 0 1 24 208 
           Z" 
        fill="url(#backGradient)" />

  <!-- Inserted Document Sheet -->
  <g transform="rotate(-2 128 130)" filter="url(#shadow-insert)">
    <rect x="48" y="75" width="160" height="110" rx="8" fill="url(#cardGrad)" />
    
    <!-- Document content lines -->
    <rect x="64" y="94" width="60" height="6" rx="2.5" fill="#90caf9" />
    <rect x="64" y="108" width="128" height="4" rx="1.5" fill="#cfd8dc" />
    <rect x="64" y="118" width="128" height="4" rx="1.5" fill="#cfd8dc" />
    <rect x="64" y="128" width="96" height="4" rx="1.5" fill="#cfd8dc" />
    <rect x="64" y="138" width="112" height="4" rx="1.5" fill="#cfd8dc" />
    <rect x="64" y="148" width="72" height="4" rx="1.5" fill="#cfd8dc" />
  </g>

  <!-- Front Flap -->
  <path d="M 24 124 
           A 12 12 0 0 1 36 112 
           L 220 112 
           A 12 12 0 0 1 232 124 
           L 232 208 
           A 12 12 0 0 1 220 220 
           L 36 220 
           A 12 12 0 0 1 24 208 
           Z" 
        fill="url(#frontGradient)" 
        stroke="url(#frontBorder)" 
        stroke-width="1.5"
        filter="url(#shadow-front)" />

  <!-- Google Drive Badge on Front Flap -->
  <g transform="translate(128, 168) scale(0.55) translate(-44, -39)" 
     filter="url(#logo-shadow)" 
     stroke="#ffffff" 
     stroke-width="0.8" 
     stroke-opacity="0.7" 
     stroke-linejoin="round">
    <!-- Path 1 (bottom-left base) -->
    <path d="m6.6 66.85 3.85 6.65c.8 1.4 1.95 2.5 3.3 3.3l13.75-23.8h-27.5c0 1.55.4 3.1 1.2 4.5z" 
          fill="url(#blueGrad)" />

    <!-- Path 2 (left side) -->
    <path d="m43.65 25-13.75-23.8c-1.35.8-2.5 1.9-3.3 3.3l-25.4 44a9.06 9.06 0 0 0 -1.2 4.5h27.5z" 
          fill="url(#greenGrad)" />

    <!-- Path 3 (bottom-right corner) -->
    <path d="m73.55 76.8c1.35-.8 2.5-1.9 3.3-3.3l1.6-2.75 7.65-13.25c.8-1.4 1.2-2.95 1.2-4.5h-27.502l5.852 11.5z" 
          fill="url(#redGrad)" />

    <!-- Path 4 (top center cap) -->
    <path d="m43.65 25 13.75-23.8c-1.35-.8-2.9-1.2-4.5-1.2h-18.5c-1.6 0-3.15.45-4.5 1.2z" 
          fill="url(#greenGrad)" 
          filter="url(#shadow-segment)" />

    <!-- Path 5 (bottom base connector) -->
    <path d="m59.8 53h-32.3l-13.75 23.8c1.35.8 2.9 1.2 4.5 1.2h50.8c1.6 0 3.15-.45 4.5-1.2z" 
          fill="url(#blueGrad)" 
          filter="url(#shadow-segment)" />

    <!-- Path 6 (right side) -->
    <path d="m73.4 26.5-12.7-22c-.8-1.4-1.95-2.5-3.3-3.3l-13.75 23.8 16.15 28h27.45c0-1.55-.4-3.1-1.2-4.5z" 
          fill="url(#yellowGrad)" 
          filter="url(#shadow-segment)" />
  </g>

  <!-- Circular Shortcut Badge (overlayed bottom-left) -->
  <g filter="url(#arrow-glow)">
    <!-- Badge Background -->
    <circle cx="62" cy="182" r="22" fill="#ffffff" stroke="#cfd8dc" stroke-width="1" />
    
    <!-- Curved Shortcut Arrow -->
    <path d="M 80 176 
             C 80 120 120 96 160 96 
             L 160 76 
             L 204 112 
             L 160 148 
             L 160 128 
             C 126 128 106 142 98 176 
             Z" 
          fill="url(#arrowGrad)" 
          transform="translate(62, 182) scale(0.22) translate(-142, -126)" />
          
    <path d="M 80 176 
             C 80 120 120 96 160 96 
             L 160 76 
             L 204 112 
             L 160 148 
             L 160 128 
             C 126 128 106 142 98 176 
             Z" 
          fill="none" 
          stroke="#ffffff" 
          stroke-width="1.5" 
          stroke-linejoin="round" 
          opacity="0.4" 
          transform="translate(62, 182) scale(0.22) translate(-142, -126)" />
  </g>
</svg>
