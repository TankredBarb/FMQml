<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="100%" height="100%">
  <defs>
    <filter id="blur-bg" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" />
    </filter>
    <filter id="shadow-page" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000000" flood-opacity="0.12" />
    </filter>
    <radialGradient id="dropShadowGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#000000" stop-opacity="0.2" />
      <stop offset="80%" stop-color="#000000" stop-opacity="0.03" />
      <stop offset="100%" stop-color="#000000" stop-opacity="0" />
    </radialGradient>
    
    <!-- Glass/translucent page gradient -->
    <linearGradient id="pageGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.6" />
      <stop offset="100%" stop-color="#eceff1" stop-opacity="0.25" />
    </linearGradient>
    
    <linearGradient id="pageBorder" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9" />
      <stop offset="100%" stop-color="#cfd8dc" stop-opacity="0.4" />
    </linearGradient>
    
    <linearGradient id="foldGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.6" />
      <stop offset="100%" stop-color="#b0bec5" stop-opacity="0.4" />
    </linearGradient>

    <!-- Shortcut blue arrow gradients -->
    <linearGradient id="arrowGrad" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#0288d1" />
      <stop offset="100%" stop-color="#00e5ff" />
    </linearGradient>
    <filter id="arrow-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#0288d1" flood-opacity="0.3" />
    </filter>
  </defs>

  <ellipse cx="128" cy="224" rx="86" ry="10" fill="url(#dropShadowGrad)" filter="url(#blur-bg)" />

  <!-- Main Page (Glassy/Translucent) -->
  <path d="M 54 42 
           A 12 12 0 0 1 66 30 
           L 166 30 
           L 202 66 
           L 202 208 
           A 12 12 0 0 1 190 220 
           L 66 220 
           A 12 12 0 0 1 54 208 
           Z" 
        fill="url(#pageGradient)" 
        stroke="url(#pageBorder)" 
        stroke-width="1.5"
        filter="url(#shadow-page)" />

  <!-- Folded Corner -->
  <path d="M 166 30 
           L 166 54 
           A 12 12 0 0 0 178 66 
           L 202 66 
           Z" 
        fill="url(#foldGradient)" />

  <path d="M 166 66 L 202 66 L 166 102 Z" fill="#000000" opacity="0.05" />

  <!-- Shortcut Arrow Graphic -->
  <g filter="url(#arrow-glow)">
    <!-- Main curved arrow stem -->
    <path d="M 80 176 
             C 80 120 120 96 160 96 
             L 160 76 
             L 204 112 
             L 160 148 
             L 160 128 
             C 126 128 106 142 98 176 
             Z" 
          fill="url(#arrowGrad)" />
          
    <!-- Outer highlight border for arrow -->
    <path d="M 80 176 
             C 80 120 120 96 160 96 
             L 160 76 
             L 204 112 
             L 160 148 
             L 160 128 
             C 126 128 106 142 98 176 
             Z" 
          fill="none" stroke="#ffffff" stroke-width="1.5" stroke-linejoin="round" opacity="0.4" />
  </g>

  <!-- Box details behind arrow -->
  <rect x="74" y="60" width="48" height="6" rx="2" fill="#cfd8dc" opacity="0.4" />
  <rect x="74" y="76" width="34" height="6" rx="2" fill="#cfd8dc" opacity="0.4" />
</svg>
