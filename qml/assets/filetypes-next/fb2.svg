<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="100%" height="100%">
  <defs>
    <filter id="blur-bg" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" />
    </filter>
    <filter id="shadow-page" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000000" flood-opacity="0.15" />
    </filter>
    <radialGradient id="dropShadowGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#000000" stop-opacity="0.25" />
      <stop offset="80%" stop-color="#000000" stop-opacity="0.04" />
      <stop offset="100%" stop-color="#000000" stop-opacity="0" />
    </radialGradient>
    
    <!-- Cream/warm paper gradient -->
    <linearGradient id="pageGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fffdf0" />
      <stop offset="100%" stop-color="#f5eccd" />
    </linearGradient>
    
    <linearGradient id="pageBorder" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#d7ccc8" stop-opacity="0.3" />
    </linearGradient>
    
    <linearGradient id="foldGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#efebe9" />
      <stop offset="100%" stop-color="#d7ccc8" />
    </linearGradient>

    <!-- Book covers gradient -->
    <linearGradient id="bookCoverGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#81c784" />
      <stop offset="100%" stop-color="#2e7d32" />
    </linearGradient>
  </defs>

  <ellipse cx="128" cy="224" rx="86" ry="10" fill="url(#dropShadowGrad)" filter="url(#blur-bg)" />

  <!-- Main Page -->
  <path d="M 54 42 
           A 12 12 0 0 1 66 30 
           L 166 30 
           L 202 66 
           L 202 208 
           A 12 12 0 0 1 190 220 
           L 66 220 
           A 12 12 0 0 1 54 208 
           Z" 
        fill="url(#pageGradient)" 
        stroke="url(#pageBorder)" 
        stroke-width="1.5"
        filter="url(#shadow-page)" />

  <!-- Folded Corner -->
  <path d="M 166 30 
           L 166 54 
           A 12 12 0 0 0 178 66 
           L 202 66 
           Z" 
        fill="url(#foldGradient)" />

  <path d="M 166 66 L 202 66 L 166 102 Z" fill="#000000" opacity="0.08" />

  <!-- Book Graphic -->
  <g>
    <!-- Open Book covers -->
    <path d="M 72 100 Q 94 95 120 108 L 120 168 Q 94 155 72 160 Z" fill="url(#bookCoverGrad)" />
    <path d="M 184 100 Q 162 95 136 108 L 136 168 Q 162 155 184 160 Z" fill="url(#bookCoverGrad)" />
    
    <!-- Open Book inner pages -->
    <path d="M 76 103 Q 94 99 117 110 L 117 165 Q 94 154 76 158 Z" fill="#ffffff" />
    <path d="M 180 103 Q 162 99 139 110 L 139 165 Q 162 154 180 158 Z" fill="#ffffff" />
    
    <!-- Book bookmark ribbon -->
    <path d="M 124 105 L 124 176 L 129 171 L 134 176 L 134 108 Z" fill="#ff7043" />
    
    <!-- Text simulated lines inside book -->
    <line x1="82" y1="118" x2="110" y2="118" stroke="#cfd8dc" stroke-width="2" />
    <line x1="82" y1="128" x2="110" y2="128" stroke="#cfd8dc" stroke-width="2" />
    <line x1="82" y1="138" x2="100" y2="138" stroke="#cfd8dc" stroke-width="2" />
    <line x1="82" y1="148" x2="110" y2="148" stroke="#cfd8dc" stroke-width="2" />
    
    <line x1="146" y1="118" x2="174" y2="118" stroke="#cfd8dc" stroke-width="2" />
    <line x1="146" y1="128" x2="174" y2="128" stroke="#cfd8dc" stroke-width="2" />
    <line x1="146" y1="138" x2="174" y2="138" stroke="#cfd8dc" stroke-width="2" />
    <line x1="146" y1="148" x2="164" y2="148" stroke="#cfd8dc" stroke-width="2" />

    <!-- Label below book (E-BOOK / FB2) -->
    <rect x="74" y="184" width="108" height="18" rx="3" fill="#cfd8dc" opacity="0.5" />
    <text x="128" y="197" font-family="Segoe UI, Arial, sans-serif" font-weight="bold" font-size="11" fill="#4e342e" text-anchor="middle" letter-spacing="1">FB2</text>
  </g>
</svg>
