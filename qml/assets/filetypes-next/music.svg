<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="100%" height="100%">
  <defs>
    <filter id="blur-bg" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" />
    </filter>
    <filter id="shadow-page" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000000" flood-opacity="0.15" />
    </filter>
    <radialGradient id="dropShadowGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#000000" stop-opacity="0.25" />
      <stop offset="80%" stop-color="#000000" stop-opacity="0.04" />
      <stop offset="100%" stop-color="#000000" stop-opacity="0" />
    </radialGradient>
    
    <linearGradient id="pageGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#f3e5f5" />
    </linearGradient>
    
    <linearGradient id="pageBorder" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#e1bee7" stop-opacity="0.4" />
    </linearGradient>
    
    <linearGradient id="foldGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f3e5f5" />
      <stop offset="100%" stop-color="#d1c4e9" />
    </linearGradient>

    <!-- Music note gradient -->
    <linearGradient id="noteGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ec407a" />
      <stop offset="100%" stop-color="#ab47bc" />
    </linearGradient>
  </defs>

  <ellipse cx="128" cy="224" rx="86" ry="10" fill="url(#dropShadowGrad)" filter="url(#blur-bg)" />

  <!-- Main Page -->
  <path d="M 54 42 
           A 12 12 0 0 1 66 30 
           L 166 30 
           L 202 66 
           L 202 208 
           A 12 12 0 0 1 190 220 
           L 66 220 
           A 12 12 0 0 1 54 208 
           Z" 
        fill="url(#pageGradient)" 
        stroke="url(#pageBorder)" 
        stroke-width="1.5"
        filter="url(#shadow-page)" />

  <!-- Folded Corner -->
  <path d="M 166 30 
           L 166 54 
           A 12 12 0 0 0 178 66 
           L 202 66 
           Z" 
        fill="url(#foldGradient)" />

  <path d="M 166 66 L 202 66 L 166 102 Z" fill="#000000" opacity="0.08" />

  <!-- Music Note Graphic -->
  <g>
    <!-- Double Musical Note -->
    <path d="M 96 150 
             A 18 14 0 1 1 78 136 
             C 78 122 92 122 96 130 
             L 96 82 
             L 166 68 
             L 166 136 
             A 18 14 0 1 1 148 122 
             C 148 108 162 108 166 116 
             L 166 84 
             L 102 96 
             L 102 136" 
          fill="url(#noteGrad)" />
    
    <!-- Top bridge join of note -->
    <path d="M 96 82 L 166 68 L 166 82 L 96 96 Z" fill="url(#noteGrad)" />
    
    <!-- Under note decoration lines representing audio wave -->
    <path d="M 76 172 Q 102 165 128 172 T 180 172" stroke="#e1bee7" stroke-width="3" stroke-linecap="round" fill="none" />
    <path d="M 90 184 Q 115 178 140 184 T 166 184" stroke="#e1bee7" stroke-width="2" stroke-linecap="round" fill="none" />
    
    <rect x="74" y="196" width="108" height="8" rx="2" fill="#cfd8dc" opacity="0.6" />
  </g>
</svg>
